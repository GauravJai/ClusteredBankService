# Akka cluster configuration
akka {
  actor {
    provider = "cluster"
    serialization-bindings {
      "com.clusteredbankservice.actor.BankAccountActor$Event" = jackson-json
      "com.clusteredbankservice.actor.BankAccountActor$Command" = jackson-json
    }
  }

  remote {
    artery {
      enabled = on
      transport = tcp
      canonical {
        hostname = "127.0.0.1"
        port = 25522
      }
    }
  }

  cluster {
;     seed-nodes = [
;       "akka://ClusteredBankServiceSystem@127.0.0.1:2551"
;     ]
    
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
    
    split-brain-resolver {
      active-strategy = keep-majority
      keep-majority {
        role = ""
      }
    }
  }

  # Persistence configuration (in-memory for development)
  persistence {
    journal.plugin = "akka.persistence.journal.inmem"
    snapshot-store.plugin = "akka.persistence.snapshot-store.local"
    
    snapshot-store.local {
      dir = "target/snapshots"
    }
  }

  # HTTP configuration
  http {
    server {
      host = "0.0.0.0"
      port = 8080
      request-timeout = 30s
      idle-timeout = 60s
    }
    
    host-connection-pool {
      max-connections = 32
      max-open-requests = 64
    }
  }

  # Cluster sharding configuration
  cluster.sharding {
    state-store-mode = persistence
    remember-entities = on
  }
  
  # Completely disable distributed data to prevent LMDB access
  akka.cluster.distributed-data {
    enabled = off
  }
  
  # Disable JVM exit on fatal error to prevent crash due to LMDB issues
  akka.jvm-exit-on-fatal-error = off

  
  # Logging configuration
  loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
}

# Logback configuration
logback {
  rootLogger.level = INFO
  rootLogger.appenderRef.stdout.ref = STDOUT
  
  logger.akka.cluster.level = INFO
  logger.akka.persistence.level = INFO
  logger.com.example.clusteredbankservice.level = DEBUG
  
  appender.stdout.name = STDOUT
  appender.stdout.type = ConsoleAppender
  appender.stdout.layout.type = PatternLayoutEncoder
  appender.stdout.layout.pattern = "%date{ISO8601} %-5level [%thread] %logger{36} - %msg%n"
}
